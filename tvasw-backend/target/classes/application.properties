# Gemini configuration
gemini.api.key=
gemini.endpoint=

# Datasource: using H2 for development by default
spring.datasource.url=jdbc:h2:mem:tvaswdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.application.name=tvasw-backend

# JWT Configuration
tvasw.app.jwtSecret=tvaswSecretKeyForJwtAuthenticationMustBeLongEnoughAndBase64Encoded
tvasw.app.jwtExpirationMs=86400000

# Spring AI Configuration (Google Gemini)
# (disabled for local stub or replace with real key in production)
spring.ai.google.genai.api-key=

# Logging
logging.level.org.springframework.security=DEBUG


